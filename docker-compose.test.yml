services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: labor_costs_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labor_costs_test"]
      interval: 2s
      timeout: 3s
      retries: 30

